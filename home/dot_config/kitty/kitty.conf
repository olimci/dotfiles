# ----- UI / behavior -----
paste_actions              quote-urls-at-prompt,replace-dangerous-control-codes,confirm
strip_trailing_spaces      smart
enable_audio_bell          no
allow_remote_control       socket-only
listen_on                  unix:/tmp/olimci-dotfiles-kitty.sock
scrollbar                  hovered
# Only prompt when closing a window/tab that still has running or background jobs.
confirm_os_window_close    -1 count-background
placement_strategy         center
resize_debounce_time       0.08
cursor_shape               beam
cursor_beam_thickness      1.6
cursor_stop_blinking_after 8.0
tab_bar_style              separator
tab_bar_edge               top
tab_separator              ""
tab_title_template         " {title} "
active_tab_title_template  " {title} "
tab_activity_symbol        "•"
tab_bar_min_tabs           2
shell_integration          enabled
notify_on_cmd_finish       invisible 10.0
progress_bar               top

# macOS
macos_option_as_alt                 yes
macos_hide_from_tasks               no
macos_quit_when_last_window_closed  yes

# ----- Clipboard -----
copy_on_select            clipboard
clipboard_control         write-clipboard read-clipboard

# ----- Fonts -----
include fonts.conf

# ----- Keybindings -----
map cmd+t                 new_tab
map cmd+n                 new_os_window
map cmd+shift+t           new_tab_with_cwd
map cmd+shift+n           new_os_window_with_cwd
map cmd+alt+v             launch --location=vsplit
map cmd+alt+h             launch --location=hsplit
map cmd+alt+shift+v       launch --location=vsplit --cwd=current
map cmd+alt+shift+h       launch --location=hsplit --cwd=current

# ----- Kittens -----
map cmd+shift+u           kitten unicode_input
map cmd+shift+g           kitten hints --type path --program -
map cmd+shift+o           kitten hints --type url --program open

# ----- Theme -----
include theme.conf
