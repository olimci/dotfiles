# ----- UI / behavior -----
paste_actions              quote-urls-at-prompt,confirm
strip_trailing_spaces      smart
enable_audio_bell          no
allow_remote_control       socket-only
listen_on                  unix:/tmp/olimci-dotfiles-kitty.sock
scrollbar                  hovered
# Only prompt when closing a window/tab that still has running or background jobs.
confirm_os_window_close    -1 count-background
tab_bar_style              separator
tab_bar_edge               top
tab_separator              ""
tab_title_template         " [ {tab.active_exe} ] "
tab_bar_min_tabs           2
shell_integration          enabled
notify_on_cmd_finish       invisible 10.0 command sh -c 'exec "$HOME/.config/kitty/cmd-finished-notify" "$@"' sh %s %c

# macOS
macos_hide_from_tasks               no
macos_quit_when_last_window_closed  yes

# ----- Fonts -----
include fonts.conf

window_padding_width 0 10

# ----- Editor / shell -----
# Use nvim found on PATH (instead of the old Nix profile path)
editor                    nvim
# Omit 'shell' to use your login shell (equivalent to "." in HM)
# shell                   /bin/zsh

# ----- Keybindings -----
map cmd+t                 new_tab
map cmd+n                 new_os_window
map cmd+shift+t           new_tab_with_cwd
map cmd+shift+n           new_os_window_with_cwd
map cmd+alt+v             launch --location=vsplit
map cmd+alt+h             launch --location=hsplit
map cmd+alt+shift+v       launch --location=vsplit --cwd=current
map cmd+alt+shift+h       launch --location=hsplit --cwd=current

# ----- Theme -----
include theme.conf
