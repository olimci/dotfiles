# Kitty ssh kitten config.
# This keeps remote-shell tweaks isolated to kitty SSH sessions only.

hostname *
share_connections yes
shell_integration inherited
remote_kitty if-needed
remote_dir .local/share/kitty-ssh-kitten

env ZDOTDIR=$HOME/.local/share/kitty-ssh-kitten/profile/zsh

copy --dest .local/share/kitty-ssh-kitten/profile/zsh/.zshenv .config/kitty/ssh/zshenv
copy --dest .local/share/kitty-ssh-kitten/profile/zsh/.zshrc .config/kitty/ssh/zshrc
copy --dest .local/share/kitty-ssh-kitten/profile/zsh/starship.toml .config/kitty/ssh/starship.toml
